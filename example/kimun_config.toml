# ─── Kimün configuration ────────────────────────────────────────────────────
#
# KEY BINDINGS
# ────────────
# Supported combinations:
#   - ctrl and/or alt (with optional shift) + a letter (a-z)
#   - bare F-key (F1–F12, no modifier required)
# Any combo that does not follow these rules is silently ignored when loaded.
#
# Format per action:
#   ActionName = ["<modifiers> & <letter>", ...]
#
# Available modifiers (combine with +):  ctrl   alt   shift
#
# Examples:
#   Quit         = ["ctrl&Q"]            # Ctrl+Q
#   SearchNotes  = ["ctrl&K"]            # Ctrl+K
#   OpenNote     = ["ctrl&O"]            # Ctrl+O  (fuzzy file finder)
#   OpenSettings = ["ctrl+shift&P"]      # Ctrl+Shift+P
#   NewJournal   = ["ctrl&J"]            # Ctrl+J
#   FileOperations = ["F2"]              # F2  (open file-ops menu: delete/rename/move)
#
# ─────────────────────────────────────────────────────────────────────────────
config_version = 2
theme = "dark"
autosave_interval_secs = 5
use_nerd_fonts = true
editor_backend = "textarea"
default_sort_field = "name"
default_sort_order = "ascending"
journal_sort_field = "name"
journal_sort_order = "descending"

[global]
current_workspace = "work"

[workspaces.work]
path = "work"
last_paths = ["/journal/2026-04-10.md", "/journal/2026-04-09.md", "/people/carlos.md"]
created = "2026-04-01T00:00:00Z"

[workspaces.personal]
path = "personal"
last_paths = ["/journal/2026-04-10.md", "/ideas/companion-planting.md", "/projects/garden-plan.md"]
created = "2026-04-01T00:00:00Z"

[key_bindings]
Quit = ["ctrl&Q"]
OpenSettings = ["ctrl&P"]
SearchNotes = ["ctrl&K"]
OpenNote = ["ctrl&O"]
NewJournal = ["ctrl&J"]
TogglePreview = ["ctrl&Y"]
TextEditor-Bold = ["ctrl&B"]
TextEditor-Italic = ["ctrl&I"]
TextEditor-Image = ["ctrl+shift&L"]
TextEditor-Underline = ["ctrl&U"]
TextEditor-Strikethrough = ["ctrl&S"]
ToggleSidebar = ["ctrl&T"]
FocusEditor = ["ctrl&L"]
FocusSidebar = ["ctrl&H"]
CycleSortField = ["ctrl&N"]
SortReverseOrder = ["ctrl&R"]
FileOperations = ["F2"]
FollowLink = ["ctrl&G"]
QuickNote = ["ctrl&W"]
ToggleBacklinks = ["ctrl&E"]
SwitchWorkspace = ["F4"]
