[package]
name = "tui"
version = "0.1.0"
edition = "2024"

[dependencies]
kimun_core = { path = "../core" }

color-eyre = "0.6.5"
crossterm = { version = "0.29.0", features = ["event-stream"] }
ratatui = { version = "0.30.0", features = ["serde"] }
serde = "1.0.228"
serde_json = "1.0.149"
toml = "0.9.8"
itertools = "0.14.0"
log = "0.4.29"
tokio = { version = "1.50.0", features = ["full"] }
tokio-util = "0.7.18"
async-trait = "0.1"
futures = "0.3"
ratatui-textarea = { version = "0.8.0", features = ["search"] }
nucleo = "0.5"
tui-widget-list = "0.15.0"
