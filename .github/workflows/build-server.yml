# Release workflow: Build and publish the Kimun server for all platforms
# Triggered on kimun_server semantic version tags (created by release-plz)
on:
  push:
    tags:
      - "kimun_server-v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

name: release-server

jobs:
  build:
    strategy:
      matrix:
        include:
          # `platform` is the release asset platform string; it flows through
          # the artifact name (dist-<platform>) into archive/asset naming in
          # create-release, so the two never drift apart.
          - name: Windows Build
            os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            binary: kimun-server.exe
          # No Intel Mac (x86_64-apple-darwin) build: fastembed -> ort 2.0.0-rc.12
          # dropped prebuilt ONNX Runtime binaries for that target after upstream
          # ONNX Runtime ended x86_64 macOS support.
          - name: MacOS Build arm64
            os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            binary: kimun-server
          - name: Linux Build
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary: kimun-server
          - name: Linux Build arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            binary: kimun-server
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache cargo registry + target/ via Swatinem/rust-cache. Tests are
      # not run here — release-plz only creates tags from main commits, and
      # every main commit has already passed check.yml's test suite.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-server-${{ matrix.target }}

      # Build the server binary
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin kimun-server

      # Copy binary to dist/
      - name: Create distribution directory
        run: mkdir -p dist
        shell: bash

      - name: Copy binary to dist
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: dist

  # Multi-arch image from the binaries compiled above — no Rust build in
  # Docker. buildx picks dist/<TARGETARCH>/kimun-server per platform.
  docker:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download linux binaries
        uses: actions/download-artifact@v4
        with:
          pattern: dist-linux-*
          path: downloaded

      - name: Arrange binaries by TARGETARCH
        run: |
          mkdir -p dist/amd64 dist/arm64
          cp downloaded/dist-linux-x64/kimun-server dist/amd64/
          cp downloaded/dist-linux-arm64/kimun-server dist/arm64/

      - name: Compute image tags
        id: tags
        run: |
          VERSION="${GITHUB_REF_NAME#kimun_server-v}"
          TAGS="ghcr.io/${{ github.repository_owner }}/kimun-server:${VERSION}"
          # :latest only for stable versions (no pre-release hyphen).
          if [[ "$VERSION" != *-* ]]; then
            TAGS="${TAGS}"$'\n'"ghcr.io/${{ github.repository_owner }}/kimun-server:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      # No qemu: the final stage is COPY-only (certs staged on the build
      # platform), so the arm64 image assembles without emulation.
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Extract version
        id: extract_version
        run: echo "version=${GITHUB_REF_NAME#kimun_server-v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      # Each build job uploads its artifact as dist-<platform>, so the platform
      # string is read straight off the directory name — no classification.
      - name: Create compressed archives with consistent naming
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd release-artifacts
          VERSION="${GITHUB_REF_NAME#kimun_server-v}"

          dirs=(dist-*/)
          if [[ ${#dirs[@]} -eq 0 ]]; then
            echo "::error::no dist-* build artifacts found"
            exit 1
          fi

          for dir in "${dirs[@]}"; do
            platform="${dir%/}"
            platform="${platform#dist-}"
            base="kimun-server-${VERSION}-${platform}"

            if [[ "$platform" == windows-* ]]; then
              (cd "$dir" && zip -r "../${base}.zip" .)
            else
              tar -czf "${base}.tar.gz" -C "$dir" .
            fi
          done

          ls -lh kimun-server-* 2>/dev/null || true
        shell: bash

      - name: Generate checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd release-artifacts
          files=(kimun-server-*.zip kimun-server-*.tar.gz)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No archives found to checksum"
            exit 1
          fi
          sha256sum "${files[@]}" > checksums-sha256.txt
          cat checksums-sha256.txt
        shell: bash

      # Attach binaries to the release created by release-plz. No `body:` /
      # `name:` here: release-plz owns the changelog, we only add assets.
      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(steps.extract_version.outputs.version, '-') }}
          append_body: false
          files: |
            release-artifacts/kimun-server-*.zip
            release-artifacts/kimun-server-*.tar.gz
            release-artifacts/checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
