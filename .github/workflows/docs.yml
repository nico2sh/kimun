# Docs workflow: Build and deploy Zola documentation to GitHub Pages
# Triggered on:
#   - pushes to main that touch docs/ (content changes)
#   - successful release-plz runs (so the sidebar release pill fetched at build
#     time via Zola load_data is refreshed against the new GitHub API latest
#     release). workflow_run always runs in the default-branch context, so the
#     github-pages environment's branch protection allows it — unlike a release
#     event, which runs under the tag ref and gets rejected.
#   - manual dispatch
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_run:
    workflows: ["release-plz"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

name: docs

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    # Skip if triggered by a failed release-plz run
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola

      - name: Build docs
        run: zola build
        working-directory: docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
