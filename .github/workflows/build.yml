# Release workflow: Build and bundle Kimun for all platforms
# Triggered on semantic version tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: stable

name: release

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Windows Build
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
            artifact_suffix: ""
            binary: kimun.exe
          - name: MacOS Build x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos
            artifact_suffix: _intel
            binary: kimun
          - name: MacOS Build arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos
            artifact_suffix: _apple_silicon
            binary: kimun
          - name: Linux Build
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux
            artifact_suffix: ""
            binary: kimun
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: "-C target-cpu=native"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache dependencies to speed up builds
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      # Build the TUI binary
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin kimun

      # Copy binary to dist/
      - name: Create distribution directory
        run: mkdir -p dist
        shell: bash

      - name: Copy binary to dist
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
        shell: bash

      # Extract version and upload build artifacts
      - name: Read version from Cargo.toml
        uses: SebRollen/toml-action@v1.2.0
        id: read_toml
        with:
          file: "tui/Cargo.toml"
          field: "package.version"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kimun ${{ steps.read_toml.outputs.value }} (${{ matrix.artifact }}${{ matrix.artifact_suffix }})
          path: dist

  publish-core:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read kimun_core version
        uses: SebRollen/toml-action@v1.2.0
        id: core_version
        with:
          file: "core/Cargo.toml"
          field: "package.version"

      - name: Check if kimun_core is already published
        id: core_check
        run: |
          VERSION="${{ steps.core_version.outputs.value }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/kimun_core/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "kimun_core ${VERSION} already published, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "kimun_core ${VERSION} not yet published, will publish."
          fi

      - name: Publish kimun_core to crates.io
        if: steps.core_check.outputs.skip == 'false'
        run: cargo publish -p kimun_core
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-tui:
    needs: publish-core
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Read kimun-notes version
        uses: SebRollen/toml-action@v1.2.0
        id: tui_version
        with:
          file: "tui/Cargo.toml"
          field: "package.version"

      - name: Check if kimun-notes is already published
        id: tui_check
        run: |
          VERSION="${{ steps.tui_version.outputs.value }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://crates.io/api/v1/crates/kimun-notes/${VERSION}")
          if [ "$STATUS" = "200" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "kimun-notes ${VERSION} already published, skipping."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "kimun-notes ${VERSION} not yet published, will publish."
          fi

      - name: Wait for crates.io to index kimun_core (if it was just published)
        if: steps.tui_check.outputs.skip == 'false'
        run: sleep 30

      - name: Publish kimun-notes to crates.io
        if: steps.tui_check.outputs.skip == 'false'
        run: cargo publish -p kimun-notes
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    needs: [build, publish-tui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version from Cargo.toml
        uses: SebRollen/toml-action@v1.2.0
        id: read_version
        with:
          file: "tui/Cargo.toml"
          field: "package.version"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      - name: Create compressed archives with consistent naming
        run: |
          cd release-artifacts
          VERSION="${{ steps.read_version.outputs.value }}"

          for dir in */; do
            dirname="${dir%/}"

            if [[ "$dirname" == *"windows"* ]]; then
              PLATFORM="windows-x64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.zip"
              cd "$dirname" && zip -r "../${ARCHIVE_NAME}" . && cd ..
            elif [[ "$dirname" == *"intel"* ]]; then
              PLATFORM="macos-x64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C "$dirname" .
            elif [[ "$dirname" == *"apple_silicon"* ]]; then
              PLATFORM="macos-arm64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C "$dirname" .
            elif [[ "$dirname" == *"linux"* ]]; then
              PLATFORM="linux-x64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C "$dirname" .
            fi
          done

          ls -lh *.zip *.tar.gz 2>/dev/null || true
        shell: bash

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum kimun-*.{zip,tar.gz} 2>/dev/null > checksums-sha256.txt || true
          cat checksums-sha256.txt
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kimun ${{ steps.read_version.outputs.value }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Download Kimun ${{ steps.read_version.outputs.value }}

            Kimun is a terminal-based notes application. Download the binary for your platform and place it somewhere on your `$PATH`.

            ### Downloads

            **Windows (x64):**
            - Download `kimun-${{ steps.read_version.outputs.value }}-windows-x64.zip`
            - Extract and run `kimun.exe`

            **macOS (Intel):**
            - Download `kimun-${{ steps.read_version.outputs.value }}-macos-x64.tar.gz`
            - Extract and run `kimun`

            **macOS (Apple Silicon):**
            - Download `kimun-${{ steps.read_version.outputs.value }}-macos-arm64.tar.gz`
            - Extract and run `kimun`

            **Linux (x64):**
            - Download `kimun-${{ steps.read_version.outputs.value }}-linux-x64.tar.gz`
            - Extract and run `kimun`

            ### Verify Downloads
            See `checksums-sha256.txt` for SHA-256 checksums to verify your download.
          files: |
            release-artifacts/kimun-*.zip
            release-artifacts/kimun-*.tar.gz
            release-artifacts/checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
