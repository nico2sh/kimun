[workspace]
# release-plz's default `git_release_type = "auto"` marks any 0.x.y version as a
# GitHub pre-release. kimün is pre-1.0 but ships these as stable, so `auto` wrongly
# flagged 0.17.0/0.18.0 as pre-releases (breaking the "Latest release" badge and
# the API `prerelease` flag the update checker would otherwise trust). Force prod:
# release-plz only ever produces plain versions from conventional commits. Real
# pre-releases are tagged with a hyphenated version (…-beta.N) outside release-plz.
git_release_type = "prod"

[[package]]
name = "kimun_core"
git_tag_name = "kimun_core-v{{ version }}"

[[package]]
name = "kimun-notes"
git_tag_name = "kimun-notes-v{{ version }}"

# Server ships as GitHub release binaries only (build-server.yml triggers on the
# tag); it is a binary, not a library, so no crates.io publish. `publish = false`
# alone is not enough: release-plz would still consult crates.io for the latest
# release, find nothing, and treat every run as an unreleased first version —
# never bumping past it. `git_only` makes it read the kimun_server-v* tags instead.
[[package]]
name = "kimun_server"
git_tag_name = "kimun_server-v{{ version }}"
publish = false
git_only = true

# Published to crates.io: kimun-notes depends on it, and crates.io requires all
# dependencies of a published crate to be published themselves.
[[package]]
name = "kimun_server_client"
git_tag_name = "kimun_server_client-v{{ version }}"
