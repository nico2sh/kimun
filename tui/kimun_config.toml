# ─── Kimün configuration ────────────────────────────────────────────────────
#
# KEY BINDINGS
# ────────────
# Supported combinations: ctrl and/or alt (with optional shift) + a letter (a-z).
# Any combo that does not follow this rule is silently ignored when loaded.
#
# Format per action:
#   ActionName = ["<modifiers> & <letter>", ...]
#
# Available modifiers (combine with +):  ctrl   alt   shift
#
# Examples:
#   Quit         = ["ctrl&Q"]            # Ctrl+Q
#   SearchNotes  = ["alt&E"]             # Alt+E
#   OpenSettings = ["ctrl+shift&P"]      # Ctrl+Shift+P
#   NewJournal   = ["ctrl+alt&J"]        # Ctrl+Alt+J
#
# ─────────────────────────────────────────────────────────────────────────────
last_paths = ["/journal/2021-06-11.md", "/journal/2021-06-16.md", "/journal/2021-06-22.md", "/index.md", "/pep.md", "/newnote.md", "/somer.md", "/journal/2026-03-20.md", "/journal/2023-11-08.md", "/journal/2026-03-23.md"]
workspace_dir = "/Users/nhormazabal/Documents/Notes"
theme = "Nord"
autosave_interval_secs = 5
use_nerd_fonts = false
default_sort_field = "name"
default_sort_order = "ascending"
journal_sort_field = "name"
journal_sort_order = "descending"

[key_bindings]
Quit = ["ctrl&Q"]
OpenSettings = ["ctrl&P"]
ToggleNoteBrowser = ["ctrl&F"]
NewJournal = ["ctrl&J"]
ToggleSidebar = ["ctrl&B"]
FocusEditor = ["ctrl&L"]
FocusSidebar = ["ctrl&H"]
SortByName = ["ctrl&N"]
SortByTitle = ["ctrl&G"]
SortReverseOrder = ["ctrl&R"]
