# Kimun RAG Server Configuration
# Copy this file to ~/.config/kimun/rag.conf and customize

[server]
# Host to bind to (default: 127.0.0.1)
host = "127.0.0.1"

# Port to listen on (default: 7573)
port = 7573

# Maximum number of concurrent jobs (default: 10)
max_concurrent_jobs = 10

# The server no longer reads the vault: Kimün pushes notes to it (push-only,
# adr/0018), so there is no [vault] section.

[auth]
# Bearer token required on every API request (Authorization: Bearer <token>)
# and to reach the web UI. Leave unset only for a localhost-only dev server;
# set one whenever the server binds beyond 127.0.0.1.
# token = "change-me"

[vector_db]
# Vector database type: "sqlite" or "qdrant"
type = "sqlite"

# SQLite-specific settings (when type = "sqlite")
db_path = "./rag_index.sqlite"

# Qdrant-specific settings (when type = "qdrant")
# Uncomment and configure if using Qdrant:
# type = "qdrant"
# url = "http://localhost:6333"
# `collection` is a namespace PREFIX: each vault gets its own Qdrant collection
# named "<collection>-<vault-id>". Leave empty to name collections by vault-id
# alone.
# collection = "kimun_embeddings"

[embedder]
# Which model turns text into vectors. All collections share one embedder, and
# the SAME model must embed documents and queries. Changing the embedder or
# model invalidates every stored vector and forces a full re-index (the store is
# recreated automatically on the next start). The vector width is detected
# automatically.

# Local, in-process, no network. Default model is BGE-Large-EN-V1.5 (1024 dims).
type = "fastembed"
# Optional: pick a bundled model by variant name (e.g. BGESmallENV15 = 384 dims,
# BGEBaseENV15 = 768) or model code (e.g. Xenova/bge-small-en-v1.5). The vector
# width is detected from the chosen model.
# model = "BGESmallENV15"

# Ollama server:
# type = "ollama"
# url = "http://localhost:11434"
# model = "nomic-embed-text"
# doc_prefix = "search_document: "   # model-specific; leave empty if unused
# query_prefix = "search_query: "

# Any OpenAI-compatible /embeddings endpoint (OpenAI, LM Studio, vLLM, gateways):
# type = "openai"
# url = "https://api.openai.com/v1"
# model = "text-embedding-3-small"
# api_key = "..."                    # or falls back to OPENAI_API_KEY

[llm]
# LLM provider: "gemini", "claude", "openai", or "mistral"
provider = "gemini"

# Model name (provider-specific)
# Gemini: "gemini-2.5-flash-preview-04-17" (default, most cost-effective)
# Claude: "claude-3-5-sonnet-20241022" (default, best for text)
# OpenAI: "gpt-4o-mini" (default, most cost-effective)
# Mistral: "mistral-large-latest" (default)
model = "gemini-2.5-flash-preview-04-17"

# API key. Prefer setting it here (server-owned, and editable in the web UI) so
# Kimün never handles it. If omitted, the server falls back to the provider's
# env var (GEMINI_API_KEY / ANTHROPIC_API_KEY / OPENAI_API_KEY / MISTRAL_API_KEY).
# api_key = "..."

# Example configurations for each provider:

# For Claude (recommended for best text quality):
# provider = "claude"
# model = "claude-3-5-sonnet-20241022"

# For OpenAI (cost-effective):
# provider = "openai"
# model = "gpt-4o-mini"

# For Mistral:
# provider = "mistral"
# model = "mistral-large-latest"

[reranker]
# Enable cross-encoder reranking for better results (default: true)
enabled = true

# Number of results to return after reranking (default: 20)
top_k = 20
