# Release workflow: Build and bundle Kimun for all platforms
# Triggered on pushes to main branch
on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
      - 'v[0-9]+.[0-9]+.[0-9]+-*'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: stable

name: release

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Windows Build
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
            artifact_suffix: ""
            target_path: "windows/app"
            package-type: msi
          - name: MacOS Build x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos
            artifact_suffix: _intel
            target_path: "macos"
            package-type: dmg
          - name: MacOS Build arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos
            artifact_suffix: _apple_silicon
            target_path: "macos"
            package-type: dmg
          - name: Linux Build
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux
            artifact_suffix: ""
            target_path: "linux/app"
            package-type: appimage
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: "-C target-cpu=native"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache dependencies to speed up builds
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      - name: Cache Dioxus CLI
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/dx
          key: ${{ runner.os }}-dx-0.7.0
          restore-keys: |
            ${{ runner.os }}-dx-

      # Install platform-specific dependencies
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            pkg-config \
            build-essential

      # Install Dioxus CLI for building/bundling
      - name: Install Dioxus CLI
        uses: taiki-e/install-action@v2
        with:
          tool: dioxus-cli@0.7.0

      # Build and package application
      - name: Create distribution directory
        run: mkdir -p dist
        shell: bash

      # Windows: Build binary only (bundling not fully supported)
      - name: Build for Windows
        if: runner.os == 'Windows'
        run: |
          cd desktop && \
          dx build --release --target ${{ matrix.target }} && \
          cp -r target/dx/kimun/release/${{ matrix.target_path}}/* ../dist/
        shell: bash

      # macOS and Linux: Create platform-specific bundles
      - name: Bundle for macOS/Linux
        if: runner.os != 'Windows'
        run: |
          cd desktop && \
          dx bundle --release --platform ${{ matrix.artifact }} --target ${{ matrix.target }} --package-types ${{ matrix.package-type }} --out-dir "bundle/${{ matrix.target_path }}" && \
          cp -r bundle/${{ matrix.target_path }}/* ../dist/
        shell: bash

      # Extract version and upload build artifacts
      - name: Read version from Cargo.toml
        uses: SebRollen/toml-action@v1.2.0
        id: read_toml
        with:
          file: "desktop/Cargo.toml"
          field: "package.version"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kimun ${{ steps.read_toml.outputs.value }} (${{ matrix.artifact }}${{ matrix.artifact_suffix }})
          path: dist

  create-release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      - name: Create compressed archives
        run: |
          cd release-artifacts
          for dir in */; do
            dirname="${dir%/}"
            if [[ "$dirname" == *"windows"* ]]; then
              cd "$dirname" && zip -r "../${dirname}.zip" . && cd ..
            else
              tar -czf "${dirname}.tar.gz" -C "$dirname" .
            fi
          done
          ls -lh
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: |
            release-artifacts/*.zip
            release-artifacts/*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
