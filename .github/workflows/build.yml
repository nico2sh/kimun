# Release workflow: Build and bundle Kimun for all platforms
# Triggered on semantic version tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: stable

name: release

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: Windows Build
            os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows
            artifact_suffix: ""
            binary: kimun.exe
          - name: MacOS Build x64
            os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos
            artifact_suffix: _intel
            binary: kimun
          - name: MacOS Build arm64
            os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos
            artifact_suffix: _apple_silicon
            binary: kimun
          - name: Linux Build
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux
            artifact_suffix: ""
            binary: kimun
    runs-on: ${{ matrix.os }}
    env:
      RUSTFLAGS: "-C target-cpu=native"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache dependencies to speed up builds
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-

      # Build the TUI binary
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin kimun

      # Copy binary to dist/
      - name: Create distribution directory
        run: mkdir -p dist
        shell: bash

      - name: Copy binary to dist
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Kimun ${{ github.ref_name }} (${{ matrix.artifact }}${{ matrix.artifact_suffix }})
          path: dist

  publish-core:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish kimun_core to crates.io
        run: |
          set +e
          output=$(cargo publish -p kimun_core 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            echo "$output" | grep -q "already exists" && exit 0 || exit $exit_code
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-tui:
    needs: publish-core
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-edit (provides cargo set-version)
        run: cargo install cargo-edit --locked

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cargo set-version -p kimun-notes "$VERSION"

      - name: Wait for crates.io to index kimun_core
        run: sleep 30

      - name: Publish kimun-notes to crates.io
        run: |
          set +e
          output=$(cargo publish -p kimun-notes --allow-dirty 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          if [ $exit_code -ne 0 ]; then
            echo "$output" | grep -q "already exists" && exit 0 || exit $exit_code
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  create-release:
    needs: [build, publish-tui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      - name: Create compressed archives with consistent naming
        run: |
          cd release-artifacts
          VERSION="${GITHUB_REF_NAME#v}"

          for dir in */; do
            dirname="${dir%/}"

            if [[ "$dirname" == *"windows"* ]]; then
              PLATFORM="windows-x64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.zip"
              cd "$dirname" && zip -r "../${ARCHIVE_NAME}" . && cd ..
            elif [[ "$dirname" == *"intel"* ]]; then
              PLATFORM="macos-x64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C "$dirname" .
            elif [[ "$dirname" == *"apple_silicon"* ]]; then
              PLATFORM="macos-arm64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C "$dirname" .
            elif [[ "$dirname" == *"linux"* ]]; then
              PLATFORM="linux-x64"
              ARCHIVE_NAME="kimun-${VERSION}-${PLATFORM}.tar.gz"
              tar -czf "${ARCHIVE_NAME}" -C "$dirname" .
            fi
          done

          ls -lh *.zip *.tar.gz 2>/dev/null || true
        shell: bash

      - name: Generate checksums
        run: |
          cd release-artifacts
          sha256sum kimun-*.{zip,tar.gz} 2>/dev/null > checksums-sha256.txt || true
          cat checksums-sha256.txt
        shell: bash

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Kimun ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Download Kimun ${{ github.ref_name }}

            Kimun is a terminal-based notes application. Download the binary for your platform and place it somewhere on your `$PATH`.

            ### Downloads

            **Windows (x64):**
            - Download `kimun-${{ github.ref_name }}-windows-x64.zip`
            - Extract and run `kimun.exe`

            **macOS (Intel):**
            - Download `kimun-${{ github.ref_name }}-macos-x64.tar.gz`
            - Extract and run `kimun`

            **macOS (Apple Silicon):**
            - Download `kimun-${{ github.ref_name }}-macos-arm64.tar.gz`
            - Extract and run `kimun`

            **Linux (x64):**
            - Download `kimun-${{ github.ref_name }}-linux-x64.tar.gz`
            - Extract and run `kimun`

            ### Verify Downloads
            See `checksums-sha256.txt` for SHA-256 checksums to verify your download.
          files: |
            release-artifacts/kimun-*.zip
            release-artifacts/kimun-*.tar.gz
            release-artifacts/checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    # Skip pre-releases (alpha, beta, rc tags contain a hyphen).
    if: ${{ !contains(github.ref_name, '-') }}

    steps:
      - uses: actions/checkout@v4

      - name: Download checksums from release
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          curl -fsSL \
            "https://github.com/nico2sh/kimun/releases/download/${GITHUB_REF_NAME}/checksums-sha256.txt" \
            -o checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"

          SHA256_MACOS_ARM64=$(grep "macos-arm64.tar.gz" checksums-sha256.txt | awk '{print $1}')
          SHA256_MACOS_X64=$(grep "macos-x64.tar.gz"    checksums-sha256.txt | awk '{print $1}')
          SHA256_LINUX_X64=$(grep "linux-x64.tar.gz"    checksums-sha256.txt | awk '{print $1}')

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_MACOS_ARM64}}/${SHA256_MACOS_ARM64}/g" \
            -e "s/{{SHA256_MACOS_X64}}/${SHA256_MACOS_X64}/g" \
            -e "s/{{SHA256_LINUX_X64}}/${SHA256_LINUX_X64}/g" \
            .github/homebrew/formula.rb.tmpl > kimun.rb

          echo "Generated formula:"
          cat kimun.rb

      - name: Push formula to tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/nico2sh/homebrew-kimun.git" tap
          mkdir -p tap/Formula
          cp kimun.rb tap/Formula/kimun.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/nico2sh/homebrew-kimun.git"
          git add Formula/kimun.rb
          git commit -m "kimun ${GITHUB_REF_NAME}"
          git push
