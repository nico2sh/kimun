# Release workflow: Build and bundle Kimun for all platforms
# Triggered on semantic version tags
on:
  push:
    tags:
      - "kimun-notes-v[0-9]+.[0-9]+.[0-9]+*"

env:
  CARGO_TERM_COLOR: always

name: release

jobs:
  build:
    strategy:
      matrix:
        include:
          # `platform` is the release asset platform string; it flows through
          # the artifact name (dist-<platform>) into archive/asset naming in
          # create-release, so the two never drift apart.
          - name: Windows Build
            os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: windows-x64
            binary: kimun.exe
          # If this Intel Mac build is ever dropped, also update:
          # .github/homebrew/formula.rb.tmpl, install.sh (macos-x64 mapping),
          # and tui/src/update/platform.rs — all expect the macos-x64 asset.
          - name: MacOS Build x64
            os: macos-latest
            target: x86_64-apple-darwin
            platform: macos-x64
            binary: kimun
          - name: MacOS Build arm64
            os: macos-latest
            target: aarch64-apple-darwin
            platform: macos-arm64
            binary: kimun
          - name: Linux Build
            os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64
            binary: kimun
          - name: Linux Build arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64
            binary: kimun
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup Rust toolchain
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Cache cargo registry + target/ via Swatinem/rust-cache. Tests are
      # not run here — release-plz only creates tags from main commits, and
      # every main commit has already passed check.yml's test suite.
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      # Build the TUI binary
      - name: Build
        run: cargo build --release --target ${{ matrix.target }} --bin kimun

      # Copy binary to dist/
      - name: Create distribution directory
        run: mkdir -p dist
        shell: bash

      - name: Copy binary to dist
        run: cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
        shell: bash

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.platform }}
          path: dist

  create-release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.extract_version.outputs.version }}

    steps:
      - name: Extract version
        id: extract_version
        run: echo "version=${GITHUB_REF_NAME#kimun-notes-v}" >> $GITHUB_OUTPUT

      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Display structure of downloaded files
        run: ls -R release-artifacts

      # Each build job uploads its artifact as dist-<platform>, so the platform
      # string is read straight off the directory name — no classification.
      - name: Create compressed archives with consistent naming
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd release-artifacts
          VERSION="${GITHUB_REF_NAME#kimun-notes-v}"

          dirs=(dist-*/)
          if [[ ${#dirs[@]} -eq 0 ]]; then
            echo "::error::no dist-* build artifacts found"
            exit 1
          fi

          for dir in "${dirs[@]}"; do
            platform="${dir%/}"
            platform="${platform#dist-}"
            base="kimun-${VERSION}-${platform}"

            # Raw, uncompressed binary asset for in-app self-update (adr/0014).
            # The running app downloads this directly, checksum-verifies it, and
            # swaps it in place — no client-side archive extraction needed.
            if [[ "$platform" == windows-* ]]; then
              (cd "$dir" && zip -r "../${base}.zip" .)
              cp "${dir}kimun.exe" "${base}.exe"
            else
              tar -czf "${base}.tar.gz" -C "$dir" .
              cp "${dir}kimun" "${base}"
            fi
          done

          ls -lh kimun-* 2>/dev/null || true
        shell: bash

      - name: Generate checksums
        run: |
          set -euo pipefail
          shopt -s nullglob
          cd release-artifacts
          # Archives + the raw self-update binaries (nullglob drops any absent).
          files=(
            kimun-*.zip kimun-*.tar.gz
            kimun-*-linux-x64 kimun-*-linux-arm64
            kimun-*-macos-x64 kimun-*-macos-arm64 kimun-*-windows-x64.exe
          )
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "::error::No archives found to checksum"
            exit 1
          fi
          sha256sum "${files[@]}" > checksums-sha256.txt
          cat checksums-sha256.txt
        shell: bash

      - name: Upload checksums for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: checksums
          path: release-artifacts/checksums-sha256.txt

      # Attach binaries to the release created by release-plz. No `body:` /
      # `name:` here: release-plz owns the changelog, we only add assets.
      - name: Attach release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(steps.extract_version.outputs.version, '-') }}
          append_body: false
          files: |
            release-artifacts/kimun-*.zip
            release-artifacts/kimun-*.tar.gz
            release-artifacts/kimun-*-linux-x64
            release-artifacts/kimun-*-linux-arm64
            release-artifacts/kimun-*-macos-x64
            release-artifacts/kimun-*-macos-arm64
            release-artifacts/kimun-*-windows-x64.exe
            release-artifacts/checksums-sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-homebrew:
    needs: create-release
    runs-on: ubuntu-latest
    # Skip pre-releases. The version is extracted by stripping the "kimun-notes-v"
    # prefix; a pre-release like "0.5.0-beta.1" will contain a hyphen in the
    # remaining version string.
    if: ${{ !contains(needs.create-release.outputs.version, '-') }}

    steps:
      - uses: actions/checkout@v4

      - name: Download checksums artifact
        uses: actions/download-artifact@v4
        with:
          name: checksums

      - name: Show checksums
        run: cat checksums-sha256.txt

      - name: Generate Homebrew formula
        run: |
          VERSION="${GITHUB_REF_NAME#kimun-notes-v}"

          SHA256_MACOS_ARM64=$(grep "macos-arm64.tar.gz" checksums-sha256.txt | awk '{print $1}')
          SHA256_MACOS_X64=$(grep "macos-x64.tar.gz"    checksums-sha256.txt | awk '{print $1}')
          SHA256_LINUX_X64=$(grep "linux-x64.tar.gz"    checksums-sha256.txt | awk '{print $1}')
          SHA256_LINUX_ARM64=$(grep "linux-arm64.tar.gz" checksums-sha256.txt | awk '{print $1}')

          sed \
            -e "s/{{VERSION}}/${VERSION}/g" \
            -e "s/{{SHA256_MACOS_ARM64}}/${SHA256_MACOS_ARM64}/g" \
            -e "s/{{SHA256_MACOS_X64}}/${SHA256_MACOS_X64}/g" \
            -e "s/{{SHA256_LINUX_X64}}/${SHA256_LINUX_X64}/g" \
            -e "s/{{SHA256_LINUX_ARM64}}/${SHA256_LINUX_ARM64}/g" \
            .github/homebrew/formula.rb.tmpl > kimun.rb

          echo "Generated formula:"
          cat kimun.rb

      - name: Push formula to tap
        run: |
          git clone "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/nico2sh/homebrew-kimun.git" tap
          mkdir -p tap/Formula
          cp kimun.rb tap/Formula/kimun.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${{ secrets.HOMEBREW_TAP_TOKEN }}@github.com/nico2sh/homebrew-kimun.git"
          git add Formula/kimun.rb
          git commit -m "${GITHUB_REF_NAME}"
          git push
