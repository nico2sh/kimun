# Docs workflow: Build and deploy Zola documentation to GitHub Pages
# Triggered on:
#   - pushes to main that touch docs/ (content changes)
#   - published releases (so the sidebar release pill fetched at build time via
#     Zola load_data is refreshed against the new GitHub API latest release)
#   - manual dispatch
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  release:
    types: [published]
  workflow_dispatch:

name: docs

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Build and Deploy Docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Zola
        uses: taiki-e/install-action@v2
        with:
          tool: zola

      - name: Build docs
        run: zola build
        working-directory: docs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
