# Kimun RAG Server Configuration
# Copy this file to ~/.config/kimun/server.toml and customize

[server]
# Host to bind to (default: 127.0.0.1)
host = "127.0.0.1"

# Port to listen on (default: 7573)
port = 7573

# Maximum number of concurrent jobs (default: 10)
max_concurrent_jobs = 10

[auth]
# Bearer token required on every API request (Authorization: Bearer <token>)
# and to sign in to the web UI. Leave unset only for a localhost-only dev
# server; set one whenever the server binds beyond 127.0.0.1.
# token = "change-me"

[vector_db]
# Vector database backend: "sqlite" (embedded) or "qdrant" (server).

# SQLite — embedded, local, no server. `path` is a directory holding the
# database file (one collection per vault). Zero setup; good for a single
# machine.
type = "sqlite"
path = "./rag_sqlite"

# Qdrant — a standalone server; better at scale. Uncomment to use instead:
# type = "qdrant"
# url = "http://localhost:6333"
# `collection` is a namespace PREFIX: each vault gets its own Qdrant collection
# named "<collection>-<vault-id>". Leave empty to name collections by vault-id
# alone.
# collection = "kimun_embeddings"

[embedder]
# Which model turns text into vectors. OPTIONAL: with no [embedder] section the
# server is UNCONFIGURED — it boots and serves the web UI, but rejects all
# indexing and search until an embedder is set (easiest from the web UI /config).
# All collections share one embedder, and the SAME model must embed documents
# and queries. Changing the embedder or model invalidates every stored vector:
# on the next start the server detects the change (embedder fingerprint) and
# wipes ALL stored collections; every vault re-indexes on its next sync.
# The vector width is detected automatically.

# Local, in-process, no network. Default model is BGE-Large-EN-V1.5 (1024 dims).
type = "fastembed"
# Optional: pick a bundled model by variant name (e.g. BGESmallENV15 = 384 dims,
# BGEBaseENV15 = 768) or model code (e.g. Xenova/bge-small-en-v1.5). The vector
# width is detected from the chosen model.
# model = "BGESmallENV15"

# Ollama server:
# type = "ollama"
# url = "http://localhost:11434"
# model = "nomic-embed-text"
# doc_prefix = "search_document: "   # model-specific; leave empty if unused
# query_prefix = "search_query: "

# Any OpenAI-compatible /embeddings endpoint (OpenAI, LM Studio, vLLM, gateways):
# type = "openai"
# url = "https://api.openai.com/v1"
# model = "text-embedding-3-small"
# api_key = "..."                    # sent as a bearer token; no env-var fallback

# Mistral (native API is OpenAI-compatible), via the same "openai" type:
# type = "openai"
# url = "https://api.mistral.ai/v1"
# model = "mistral-embed"            # 1024 dims; "codestral-embed" for code-heavy vaults
# api_key = "..."                    # Mistral API key

# Google Gemini, via its OpenAI-compatibility layer:
# type = "openai"
# url = "https://generativelanguage.googleapis.com/v1beta/openai"
# model = "gemini-embedding-001"     # 3072 dims
# api_key = "..."                    # Gemini API key

# Voyage AI (Anthropic has no embeddings API and points to Voyage; the Voyage
# API is OpenAI-shaped):
# type = "openai"
# url = "https://api.voyageai.com/v1"
# model = "voyage-3.5"
# api_key = "..."                    # Voyage API key

[llm]
# LLM provider: "gemini", "claude", "openai", or "mistral"
provider = "gemini"

# Model name (provider-specific)
# Gemini: "gemini-2.5-flash-preview-04-17" (default, most cost-effective)
# Claude: "claude-3-5-sonnet-20241022" (default, best for text)
# OpenAI: "gpt-4o-mini" (default, most cost-effective)
# Mistral: "mistral-large-latest" (default)
model = "gemini-2.5-flash-preview-04-17"

# API key. Prefer setting it here (server-owned, and editable in the web UI) so
# Kimün never handles it. If omitted, the server falls back to the provider's
# env var (GEMINI_API_KEY / ANTHROPIC_API_KEY / OPENAI_API_KEY / MISTRAL_API_KEY).
# api_key = "..."

# Example configurations for each provider:

# For Claude (recommended for best text quality):
# provider = "claude"
# model = "claude-3-5-sonnet-20241022"

# For OpenAI (cost-effective):
# provider = "openai"
# model = "gpt-4o-mini"

# The openai provider can also point at any OpenAI-compatible chat endpoint
# (Ollama, llama.cpp, OpenRouter, LM Studio) via an optional url:
# provider = "openai"
# url = "http://localhost:11434/v1"
# model = "llama3"

# For Mistral:
# provider = "mistral"
# model = "mistral-large-latest"

[reranker]
# Enable reranking for better result ordering (default: true). Reranker
# failure is never fatal: if it fails to initialize (model download blocked,
# endpoint unreachable) the server logs a warning and keeps running without
# reranking — /health then reports "reranker": false with the reason under
# "reranker_error" — and a rerank call failing mid-query degrades that
# request to plain vector ranking.
enabled = true

# Default number of results returned by search/answer, overridable per request
# via context_size (default: 20). One exception: answer without a reranker
# ignores it — the context cut below decides the LLM context size from the
# pool's score shape, not a fixed count.
top_k = 20

# Context cut algorithm for answer when no reranker is active (adr/0027):
#   "score-range"  (default) — similarity scores are min-max normalized within
#                   the retrieved pool (range measured between the 5th/95th
#                   score percentiles, so outliers can't stretch it); chunks
#                   at or above 0.4 of the range join the LLM context.
#   "largest-drop" — cut at the biggest relative drop between consecutive
#                   NOTE scores (each note's best chunk,
#                   (s[i] - s[i+1]) / s[i]), searched at note positions 3-30;
#                   keeps the gap-closing note and every pooled chunk at or
#                   above its score. No drop found there means no cut.
# Flat scores mean no relevance boundary: neither algorithm cuts.
# context_cut = "score-range"

# Tuning knob for "score-range": the normalized cutoff in 0.0..=1.0
# (default 0.4). Higher = stricter (fewer chunks). Ignored by "largest-drop".
# score_range_cutoff = 0.4

# Local fastembed cross-encoder (BGE-Reranker-Base), the default. Downloads
# the model from Hugging Face on first start — independent of the [embedder]
# choice. Set enabled = false (or use type = "http") to skip the download.
type = "fastembed"

# Or any Cohere/Jina-compatible HTTP rerank endpoint: POST {url}/rerank with
# {model, query, documents} answered by scored indices. Covers Cohere, Jina,
# Voyage, and self-hosted vLLM / Infinity. NOT available from OpenAI, Mistral,
# Gemini, or Anthropic — none of them offers a rerank API (Anthropic points to
# Voyage). `model` is optional for single-model self-hosted servers; `api_key`
# is sent as a bearer token.
#
# Cohere:
# type = "http"
# url = "https://api.cohere.com/v2"
# model = "rerank-v3.5"
# api_key = "..."
#
# Jina AI:
# type = "http"
# url = "https://api.jina.ai/v1"
# model = "jina-reranker-v2-base-multilingual"
# api_key = "..."
#
# Voyage AI (Anthropic's recommended embeddings/reranking partner):
# type = "http"
# url = "https://api.voyageai.com/v1"
# model = "rerank-2.5"
# api_key = "..."
#
# Self-hosted vLLM (or Infinity at its root URL):
# type = "http"
# url = "http://localhost:8000/v1"
# model = "BAAI/bge-reranker-v2-m3"
